<div class="modal-overlay" (click)="close.emit()">

  <div class="modal-container" (click)="$event.stopPropagation()">

    <!-- HERO -->
    <div class="modal-hero">
      <img *ngIf="project.image?.length" [src]="project.image[0].src" />
      <div class="overlay"></div>

      <div class="hero-text">
        <h1>{{ project.title }}</h1>
        <p>{{ project.description }}</p>
      </div>
    </div>

    <!-- INFO -->
    <div class="modal-info">
      <div>
        <h4>Technologies</h4>
        <div class="tech-list">
          <span *ngFor="let tech of project.technologies">
            {{ tech }}
          </span>
        </div>
      </div>
    </div>

    <!-- FEATURES -->
    <div class="modal-features" *ngIf="project.features?.length">
      <h3>Features</h3>
      <ul>
        <li *ngFor="let f of project.features">{{ f }}</li>
      </ul>
    </div>

    <!-- GALLERY -->
    <div class="modal-gallery">

      <div class="gallery-item"
           *ngFor="let media of project.image">

        <!-- VIDEO -->
        <ng-container *ngIf="media.src.endsWith('.mp4'); else imgBlock">
          <video controls>
            <source [src]="media.src" type="video/mp4">
            Your browser does not support the video tag.
          </video>
        </ng-container>

        <!-- IMAGE -->
        <ng-template #imgBlock>
          <img [src]="media.src" />
        </ng-template>

        <!-- CAPTION -->
        <div class="caption">
          {{ media.description }}
        </div>

      </div>

    </div>

  </div>

  <!-- CLOSE BUTTON -->
  <button class="close-btn" (click)="close.emit()">✕</button>

</div>
