<div class="modal-overlay" (click)="close.emit()">

  <div class="modal-container" (click)="$event.stopPropagation()">

    <!-- HERO -->
    <div class="modal-hero">
      <img *ngIf="project.images?.length" [src]="project.images[0].src" />
      <div class="overlay"></div>

      <div class="hero-text">
        <h1>{{ project.title }}</h1>
        <p>{{ project.description }}</p>
      </div>
    </div>

    <!-- INFO -->
    <div class="modal-info">

      <div>
        <h4>Technologies</h4>
        <div class="tech-list">
          <span *ngFor="let tech of project.technologies">
            {{ tech }}
          </span>
        </div>
      </div>

 

    </div>

    <!-- FEATURES -->
    <div class="modal-features" *ngIf="project.features?.length">
      <h3>Features</h3>
      <ul>
        <li *ngFor="let f of project.features">{{ f }}</li>
      </ul>
    </div>

    <!-- GALLERY -->
    <div class="modal-gallery">
      <div class="gallery-item"
           *ngFor="let img of project.image; let i = index"
           [ngClass]="{'big': i === 0}">

        <img [src]="img.src" />
        <div class="caption">{{ img.description }}</div>

      </div>
    </div>

  </div>
<button class="close-btn" (click)="close.emit()">✕</button>
</div>
